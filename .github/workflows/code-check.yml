name: code check

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.7"
          cache: true

      - name: Format
        run: >-
          dart format --set-exit-if-changed
          packages/altive_lints_plugin/lib
          packages/altive_lints_plugin/test
          tool

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: dart test packages/altive_lints_plugin --fail-fast

      - name: Verify v4 dependency isolation
        run: dart run tool/verify_v4_split.dart
